version: '3.8'

services:
  db:
    image: mariadb:10.11 # MariaDB is highly recommended over MySQL for Nextcloud
    container_name: nextcloud-db
    restart: always
    command: --transaction-isolation=READ-COMMITTED --binlog-format=ROW
    volumes:
      - ${NEXTCLOUD_DB_DIR}:/var/lib/mysql
    environment:
      - MYSQL_ROOT_PASSWORD=${DB_ROOT_PASSWORD}
      - MYSQL_PASSWORD=${DB_PASSWORD}
      - MYSQL_DATABASE=${DB_NAME}
      - MYSQL_USER=${DB_USER}

  redis:
    image: redis:alpine
    container_name: nextcloud-redis
    restart: always

  app:
    build: . # Builds from the Dockerfile in the same directory for SMB support
    container_name: nextcloud-app
    restart: always
    ports:
      - "${NEXTCLOUD_PORT}:80"
    volumes:
      - ${NEXTCLOUD_DATA_DIR}:/var/www/html
    environment:
      - MYSQL_PASSWORD=${DB_PASSWORD}
      - MYSQL_DATABASE=${DB_NAME}
      - MYSQL_USER=${DB_USER}
      - MYSQL_HOST=db
      - REDIS_HOST=redis
      - NEXTCLOUD_ADMIN_USER=${NEXTCLOUD_ADMIN_USER}
      - NEXTCLOUD_ADMIN_PASSWORD=${NEXTCLOUD_ADMIN_PASSWORD}
      - REDIS_HOST=redis
      - REDIS_HOST_PORT=6379
      - NEXTCLOUD_TRUSTED_DOMAINS=${NEXTCLOUD_TRUSTED_DOMAINS}
    depends_on:
      - db
      - redis

  cron:
    build: . # Uses the exact same custom image as the app
    container_name: nextcloud-cron
    restart: always
    volumes:
      - ${NEXTCLOUD_DATA_DIR}:/var/www/html
    entrypoint: /cron.sh
    depends_on:
      - db
      - redis
